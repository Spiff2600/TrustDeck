name: consistency

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Numbers must sum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cross-artifact consistency checks
        run: python scripts/check_consistency.py
